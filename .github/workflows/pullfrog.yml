# PULLFROG ACTION — 已按需修改 (支持小米 MiMo + 自动触发)
name: Pullfrog
on:
  # 自动触发：当有新 Issue 创建时运行
  issues:
    types: [opened]
  # 你也可以保留手动触发，方便调试
  workflow_dispatch:
    inputs:
      prompt:
        type: string
        description: Agent prompt (手动触发时使用)
      name:
        type: string
        description: Run name

# 权限提升：需要写入代码和 PR 的权限
permissions:
  contents: write
  pull-requests: write
  id-token: write
  issues: read

jobs:
  pullfrog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set bot git identity
        run: |
          git config user.name "pullfrog[bot]"
          git config user.email "pullfrog[bot]@users.noreply.github.com"

      - name: Run agent
        uses: pullfrog/pullfrog@v0
        with:
          # 自动触发时使用 Issue 的标题 + 正文作为 Prompt
          prompt: |
            ${{ github.event.issue.title }} ${{ github.event.issue.body }}

            重要：在你的 PR 描述中必须包含 "Fixes #${{ github.event.issue.number }}" 以便合并后自动关闭 Issue。
        env:
          # ---------- 小米 MiMo 配置 ----------
          ANTHROPIC_API_KEY: ${{ secrets.MIMO_API_KEY }}
          ANTHROPIC_BASE_URL: "https://token-plan-cn.xiaomimimo.com/anthropic"
          ANTHROPIC_MODEL: "mimo-v2.5-pro"
