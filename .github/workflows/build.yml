name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build Portable (self-contained)
        run: dotnet publish src/ApexTodo.Windows -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o release-portable

      - name: Build Framework-dependent
        run: dotnet publish src/ApexTodo.Windows -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o release-framework

      - name: Clean up
        run: |
          Remove-Item release-portable/*.pdb -ErrorAction SilentlyContinue
          Remove-Item release-portable/*.json -ErrorAction SilentlyContinue
          Remove-Item release-framework/*.pdb -ErrorAction SilentlyContinue
          Remove-Item release-framework/*.json -ErrorAction SilentlyContinue
          Rename-Item release-portable/ApexTodo.Windows.exe ApexTodo.Windows.Portable.exe

      - name: Upload Portable
        uses: actions/upload-artifact@v4
        with:
          name: ApexTodo-Portable
          path: release-portable/ApexTodo.Windows.Portable.exe

      - name: Upload Framework
        uses: actions/upload-artifact@v4
        with:
          name: ApexTodo-Framework
          path: release-framework/ApexTodo.Windows.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ApexTodo-Portable/ApexTodo.Windows.Portable.exe
            artifacts/ApexTodo-Framework/ApexTodo.Windows.exe
          generate_release_notes: true
